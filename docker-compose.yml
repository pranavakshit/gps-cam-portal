version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: gps_cam_db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: gps_cam_portal
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gps_cam_backend
    environment:
      - PORT=5000
      - DATABASE_URL=mysql://root:password@database:3306/gps_cam_portal
      - JWT_SECRET=your-secret-key-here
    ports:
      - "5000:5000"
    depends_on:
      - database

  web-portal:
    build:
      context: ./web-portal
      dockerfile: Dockerfile
    container_name: gps_cam_web
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db_data:
