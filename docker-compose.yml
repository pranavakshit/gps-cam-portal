services:
  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: gps_cam_portal
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=5000
      - DATABASE_URL=mysql://root:password@db:3306/gps_cam_portal
      - JWT_SECRET=your-secret-key-here
    depends_on:
      - db
    # We use command to run the start script which handles Prisma migration and seeding, then run dev server
    command: sh -c "npx prisma generate && npx prisma db push --accept-data-loss && npx ts-node prisma/seed.ts && npm run dev"

  web-portal:
    build:
      context: ./web-portal
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./web-portal:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  db_data:
